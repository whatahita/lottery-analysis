services:
  lottery:
    build: .
    container_name: lottery-analysis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8000:8000"
    environment:
      - LOTTERY_DATA_DIR=/app/data
      - LOTTERY_AUTH_USER=${LOTTERY_AUTH_USER:-}
      - LOTTERY_AUTH_PASSWORD=${LOTTERY_AUTH_PASSWORD:-}
    volumes:
      - ./data:/app/data
